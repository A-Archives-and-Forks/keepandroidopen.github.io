# Social share messages (rotated randomly; {url} is replaced at build time)
social_callout_x_1: "A partir de 2027, Google va bloquer toutes les apps Android dont le développeur ne se sera pas enregistré et prouvé son identité. Cela concerne tous les appareils Android à travers le monde. En savoir plus: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google oblige tous les développeurs Android à s'inscrire, payer des frais, et envoyer une preuve d'identité gouvernementale. Cela ferme Android. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_3: "Le caractère ouvert d'Android le distingue de l'iPhone depuis 17 ans. Google requiert maintenant l'enregistrement dévelopeur obligatoire pour toutes les apps, y compris celles distribuées en dehors du Play Store. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, le play-store open-source, qualifie la vérification développeur de Google de \"menace existentielle\" à la distribution d'applications alternatives. L'EFF averti que cela ouvre la voie à la censure. {url} #KeepAndroidOpen"
social_callout_x_5: "La méthode de contournement de Google nécessite 9 étapes, 24 heures d'attente, via Play Services que Google peut révoquer à tout moment. {url} #KeepAndroidOpen"
social_callout_x_6: "Android était ouvert. Google requiert maintenant l'inscription développeur pour installer n'importe quelle app sur votre propre téléphone. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_7: "Vous possédiez votre téléphone. Désormais Google décide quelles apps vous pouvez installer. C'est inacceptable. {url} #KeepAndroidOpen"
social_callout_x_8: "Google est en train de transformer Android en un jardin fermé. Identification obligatoire, frais d'inscription, et 9 étapes avancées pour les installations parallèles ? Ce n'est pas de la sécurité, mais une prise de monopole. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_9: "L'inscription obligatoire menace la première app d'un étudiant, les outils de respect de la vie-privée de volontaires, et tout développement indépendant. {url} #KeepAndroidOpen"
social_callout_x_10: "17 ans d'ouverture d'Android sont en danger. Google prévoyant de bloquer les applications non vérifiées est un coup direct contre F-Droid et le logiciel indépendant. Stoppez le vérrouillage: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_linkedin_1: "A compter de 2027, Google va obliger tous les développeurs Android à s'inscrire de manière centralisée et à prouver leur identité pour que leur logiciels puissent être installé sur tous les appareils. C'est valable pour toutes les apps, pas seulement celles du Play Store, environ 67 organisations ont signé une lettre ouverte dénoncant cette politique. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Android se distingue depuis au moins deux décennies par son caractère open-source. Google rend désormais obligatoire l'inscription pour toutes les apps Android, y compris celles distribuées via des magasins alternatifs comme F-droid. L'EFF, la FSF, le projet Tor, et une douzaine d'organisations suscitent des inquiétudes importantes. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Le programme de vérification développeur de Google va donner à une seule entreprise le pouvoir de techniquement bloquer n'importe quelle appli, de n'importe quel développeur, sur n'importe quel appareil Android certifié à travers le monde. C'est une remise en cause des développeurs indépendants, des projets open-source, et du principe que vous contrôlez les logiciels sur le matériel qui vous appartient. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "La solution de secours proposée par Google pour installer en parrallèle des applications non vérifiées nécessitera 9 étapes, une attente obligatoire de 24h, et s'effectuera entièrement via les services du Play Store. La communauté doit se contenter du post d'un blog comme solution de secours. Cela n'a été mentionné dans aucune version beta. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "La souveraineté digitale est en jeu. Le projet de Google d'obliger l'inscription des développeurs pour tous les apps Android, même celles distribuées en dehors du Play Store, créée un unique point de contrôle centralisé et potentiellement une censure pour 3 milliards d'apareils. {url} #KeepAndroidOpen"
social_callout_linkedin_7: "La campagne \"Garder Android Ouvert\" a le soutien d'au moins 67 organismes internationaux. Nous nous opposons au projet Google de bloquer toute application dont le développeur ne s'est pas inscris et prouvé son identité de manière centralisée. Lisez la ettre ouverte: {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Changer rétroactivement les règles sur le matériel que les gens possèdent déjà est un précédant dangereux. La vérification dévelopeur obligatoire de Google prive les utilisateurs de leur libre arbitre et les force à l'inérieur d'un écosystème managé. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-droid et l'EFF donnent l'alerte: Le programme de vérification de Google est une 'menace existentielle' à la distribution alternative d'applications. Nous devons protéger l'écosystème open-source qui fait Android. {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Alors que Google renforce son contrôle d'accès, la communauté résiste. Votre appareil doit vous appartenir, et non être une location d'un terminal qui peut être sujet à des restrictions rétroactives. Rejoignez le mouvement: {url} #KeepAndroidOpen"
social_callout_bluesky_1: "À partir de 2027, Google bloque les apps Android dont le développeur ne s'est pas enregistré. Cela touche toutes les applications. En savoir plus: @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_2: "Google requiert que tous les développeur Android s'enregistrent, payent des frais, et vérifient leur identité. Les applications des développeurs non enregistrés seront discrètement bloquées. 67 organisations s'y opposent. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "17 ans d'Android ouvert disparaissent. Google impose l'inscription des développeurs pour toutes les apps. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_4: "Contourner le blocage Google : 9 étapes, 24 heures d'attente, via Play Services révocable. C'est un piège, pas une solution. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_5: "L'EFF alerte : la vérification crée une voie vers la censure. Les développeurs en pays restrictifs et les contributeurs seront visés. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_6: "3 milliards d'utilisateurs ont choisi Android pour son ouverture. Le blocage de Google change tout. Résistez. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_7: "La propriété signifie le contrôle. Si Google peut bloquer n'importe quelle app sur votre téléphone, c'est que vous le possédez pas réellement. Rejoignez les quelques 100,000 personnes et plus qui se battent pour garder Android ouvert. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Une vérification d'identité obligatoire pour chaque développeur d'applications ? Il s'agit d'un rêve pour la censure et d'un cauchemar pour la vie privée. Protégez le Web ouvert et le mobile libre. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "L'installation d'applications tierces ne devrait pas nécessiter une attente de 24 heures et 9 étapes pour y parvenir. La solution de contournement de Google est destinée a échouer. Gardez Android Ouvert ! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_10: "De F-Droid aux développeurs indépendants, l'écosystème Android entier est sous la menace du décret d'inscription obligatoire de Google. Découvrez pourquoi au moins 67 organisations disent non. {url}"
social_callout_mastodon_1: "A partir de 2027, Google va demander à chaque développeur Android de s'inscrire, fournir une preuve d'identité, et enregistrer ses clés de développement. Les applications des développeurs non inscrits seront bloquées sur tous les appareils Android certifiés à travers le monde. Cela menace F-Droid, la distribution open-source, et l'autonomie utilisateur. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Le programme de vérification développeur Google Android nécessite une preuve d'identité, les clés de signature, et des frais pour chaque développeur qui veut déployer son application sur Android. L'EFF considère ce contrôle d'accès comme \"une voie vers la censure\" plus de 67 organismes ont signé une lettre ouverte s'y opposant. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, magasin de milliers d'applications libre et open-source, qualifie la vérification développeur de Google de \"menace existentielle.\" Environ 85% des apps F-Droid pourrait rencontrer des difficultés de déploiement, car leur développeurs ont signé le code via F-Droid et non via Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "La méthode proposée par Google pour continuer à installer des apps non vérifiées nécessite 9 étapes, une période d'attente obligatoire de 24 heures, et passe par le Play Store, pas par le système d'exploitation d'Android. Google peut supprimer ou modifier cette méthode à tout moment. Cela n'a été inclus dans aucune version bêta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "L'inscription développeur obligatoire que Google impose soulève des inquiétudes pour les développeurs dans des pays sous sanctions internationnales, pour les contributeurs anonymes à l'open-source, et n'importe quelle personne développant des outils de respect de la vie privée ou des outils de sécurité. Google a un historique documenté de conformité avec les demandes gouvernementales de retrait d'applications. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "La force d'Android était sa nature décentralisée. Le projet de Google d'obliger l'inscription centralisée pour chaque développeur d'apps détruit cela. Nous devons résister à cette centralisation du pouvoir. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "Si vous avez acheté le matériel, vous devriez avoir le dernier mot sur les logiciels Le projet de Google de bloquer les applis non vérifiées est une attaque directe sur la souveraineté de l'utilisateur. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Imaginez un monde où le moindre passionné ou développeur volontaire doit s'inscrire auprès d'une corporation globale juste pour partager son travail. C'est le monde que Google est en train de construire pour Android en 2027. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "La méthode de contournement de Google pour installer d'autres applications est un moyen de dissuasion, pas une méthode de secours. 9 étapes et une attente de 24 heures pour des logiciels que vous possédez ? Non merci. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "Un peu plus de 100,000 personnes et 67 organismes se tiennent contre la tentative de Google de vérrouiller Android. Rejoignez le combat pour une véritable écosystème mobile ouvert et libre. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_facebook_1: "A partir de 2027, Google va demander à chaque développeur d'app Android de s'inscrire de manière centralisée et de fournir une preuve d'idendité. Les apps de développeur non inscrits seront bloquées sur tous les Android certifiés à travers le monde. Cela s'applique à toutes les apps, par seulement celles du Play Store. En savoir plus: {url}"
social_callout_facebook_2: "F-Droid, le magasin d'apps Android open-source utilisé par des millions de personnes, considère la vérification développeur de Google comme \"une menace existentielle.\" à la continuité de ses activités. Un peu plus de 67 organismes incluant l'EFF, la FSF, et le projet Tor ont signé une lette ouverte opposant cette politique. Découvrez pourquoi c'est important: {url}"
social_callout_facebook_3: "La solution de secours proposée par Google pour continuer à installer des apps non vérifiées après leur vérrouillage nécessite 9 étapes, une attente obligatoire de 24 heures, et se fait via les services du Play Store de Google (que Google peut modifier à tout moment). La communauté est censé accepter un simple post de blog comme alternative. {url}"
social_callout_facebook_4: "L'ouverture d'Android a défini sa nature depuis 17 ans. Des millions de personnes l'ont choisi au détriment de l'iPhone précisément pour cette raison. Google oblige désormais l'inscription des développeurs pour toute les apps, y compris celles distribuées en dehors du Play Store. Les développeurs indépendants et projets open-source seront les plus touchés. {url}"
social_callout_facebook_5: "L'EFF considère le contrôle d'accès d'applications comme \"une voie vers la censure.\". La vérification développeur de Google va donner à une seule entreprise la capacité de bloquer n'importe quelle app, de n'importe quel développeur, sur n'importe quel appareil à travers le monde. Cela créé un précédent qui s'étend au delà d'Android et du futur de l'informatique personnelle. {url}"
social_callout_facebook_6: "Votre téléphone, votre choix ? Pas si Google en décide autrement. A partir de 2027, ils projettent de bloquer toute application dont le développeur ne sera pas inscrit et prouvé son identité. Cela concerne tout le monde. {url}"
social_callout_facebook_7: "Google vérrouille rétroactivement des millions d'appareils qui ont été vendus comme plateformes open-source. Ce retrait soudain menace les développeurs indépendants et les magasins d'app alternatifs comme F-Droid. {url}"
social_callout_facebook_8: "Votre téléphone est-t'il vraiment le vôtre ? Si Google peut décider quelles apps vous êtes autorisé à installer, alors la réponse est non. Rejoignez les plus de 100,00 personnes qui se battent pour garder Android ouvert. {url}"
social_callout_facebook_9: "La procédure en 9 étapes de Google pour autoriser les applications non-vérifiées est un piège. C'est destiné a être tellement difficile pour que personne ne l'utilisera, donnant à Google le contrôle total. {url}"
social_callout_facebook_10: "Des étudiants construisant leur première app aux volontaires créant des outils pour la vie privée, l'inscription obligatoire de Google va geler toute innovation. Aidez-nous à garder Android ouvert ! {url}"

