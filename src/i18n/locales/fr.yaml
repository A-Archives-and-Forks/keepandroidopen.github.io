# FAQ page
footer_faq: "FAQ"
faq_title: "Foire aux questions"
faq_description: "Foire aux questions sur le programme de vérification des développeurs Android de Google et le verrouillage des applications à venir."
faq_intro: "Réponses aux questions fréquentes sur le programme de vérification des développeurs Android de Google et le verrouillage des applications. Nous continuerons d'enrichir cette page à mesure que la situation évolue."
faq_q_datechange: "Pourquoi la date du verrouillage est-elle passée de septembre 2026 à janvier 2027 ?"
faq_a_datechange: "Le verrouillage devait initialement débuter en septembre 2026 dans quatre premiers pays. Depuis, il a été mis à jour afin de limiter le déploiement initial à une liste précise de boutiques d'applications Android, qui n'inclut pas F-Droid. Cela signifie que l'activation de septembre n'affectera PAS F-Droid lui-même ni aucune application installée via F-Droid. La date à laquelle le verrouillage commencera à toucher les utilisateurs de F-Droid n'est pas encore publiée. Nous tiendrons cette page à jour au fur et à mesure des nouveaux détails de calendrier qui nous seront communiqués. Pour en savoir plus, consultez la [FAQ de Google sur la vérification des développeurs](https://developer.android.com/developer-verification/guides/faq#general)."
