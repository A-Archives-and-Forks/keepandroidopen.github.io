# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: "**[Lisez et partagez notre lettre ouverte](/open-letter)**"
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: >-
  **Dites à Google ce que vous pensez** via leur propre [sondage sur la vérification des développeurs](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(pour tout le bien que cela fera)</small>.
# [en] act_dev_heading: "Developers"
act_dev_heading: "Développeurs"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Ne vous enregistrez pas.</strong> Ne rejoignez pas le programme en vous inscrivant à la console développeur Android et en acceptant leurs conditions générales irrévocables. Ne vérifiez pas votre identité. *Ne jouez pas le jeu.*
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "Le plan de Google ne fonctionne que si les développeurs s'y conforment. Ne le faites pas."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Parlez avec d'autres développeurs et organisations pour les convaincre de ne pas s'inscrire."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  Ajouter la [FreeDroidWarn librairie](https://github.com/woheller69/FreeDroidWarn) à vos applications pour avertir les utilisateurs.
