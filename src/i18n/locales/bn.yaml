social_callout_x_6: "অ্যান্ড্রয়েড আমাদের কাছে একটি ওপেন প্ল্যাটফর্ম হিসেবে বিক্রি করা হয়েছিল। এখন গুগল ৩ বিলিয়ন ব্যবহারকারীর ওপর নিয়ন্ত্রণ নিতে চাইছে। এটি হতে দেবেন না। {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_7: "আপনি যদি ফোনটি কিনে থাকেন, তবে মালিকানা আপনারই হওয়া উচিত। গুগলের এই নতুন নিয়ম আপনার স্বাধীনতায় হস্তক্ষেপ করছে। পিটিশনে যোগ দিন: {url} #KeepAndroidOpen"
social_callout_x_8: "গুগল অ্যান্ড্রয়েডকে একটি দেয়াল ঘেরা বাগানে পরিণত করছে। আইডি রেজিস্ট্রেশন আর ফি আসলে একচেটিয়া ব্যবসার কৌশল। {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_9: "একজন ছাত্রের বানানো প্রথম অ্যাপ বা কোনো ভলান্টিয়ারের বানানো প্রাইভেসী টুলের কী হবে? গুগলের এই নীতি ছোট উদ্ভাবকদের পথ বন্ধ করে দিচ্ছে। {url} #KeepAndroidOpen"
social_callout_x_10: "অ্যান্ড্রয়েডের ১৭ বছরের স্বাধীনতা হুমকির মুখে। আনভেরিফাইড অ্যাপ ব্লক করার এই পরিকল্পনা F-Droid এর ওপর সরাসরি হামলা। লকডাউন থামান: {url} @AlteredDeal #KeepAndroidOpen"

