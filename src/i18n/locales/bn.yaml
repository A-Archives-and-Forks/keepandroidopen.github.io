# Who this hurts
impact_heading: "ক্ষতিগ্রস্ত হবে কারা?"
impact_you_heading: "আপনি নিজে"
impact_you_p1: "আপনি অ্যান্ড্রয়েড ফোন কিনেছিলেন কারণ গুগল বলেছিল এটি একটি 'ওপেন' প্ল্যাটফর্ম। আপনি যা খুশি ইন্সটল করতে পারতেন, এটাই ছিল শর্ত।"
impact_you_p2: >-
    গুগল এখন সেই শর্ত পাল্টে দিচ্ছে আপনার কেনা হার্ডওয়্যারের ওপর। আপডেটটি আসার পর, আপনি কেবল গুগলের অনুমোদিত সফটওয়্যারই চালাতে পারবেন। আপনার ফোন: যেটা *আপনার* সম্পত্তি, যার জন্য টাকা *আপনি* দিয়েছেন।
impact_dev_heading: "স্বতন্ত্র ডেভেলপাররা"
impact_dev_p1: "একজন কিশোরের বানানো প্রথম অ্যাপ হোক, কোনো ভলান্টিয়ারের বানানো প্রাইভেসী টুল হোক, কিংবা কোনো কোম্পানির গোপন ইন্টারনাল বেটা অ্যাপ—গুগলের অনুমতি ছাড়া ২০২৬ সালের সেপ্টেম্বরের পর এর কোনোটিই ইন্সটল করা যাবে না।"
impact_dev_p2: >-
    হাজার হাজার ফ্রি এবং ওপেন-সোর্স অ্যাপের ভাণ্ডার [F-Droid ↗](https://f-droid.org) একে একটি ["অস্তিত্বের হুমকি" ↗](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) হিসেবে বর্ণনা করেছে। কোরি ডক্টরো একে বলছেন ["ডার্থ অ্যান্ড্রয়েড" ↗](https://pluralistic.net/2025/09/01/fulu/)।
impact_gov_heading: "সরকার এবং সুশীল সমাজ"
impact_gov_p1: >-
    স্বৈরাচারী শাসকরা অ্যাপ সরিয়ে ফেলার দাবি জানালে গুগলের তা মেনে নেওয়ার [প্রমাণিত রেকর্ড ↗](https://www.aclu.org/news/free-speech/app-store-oligopoly) আছে। এই প্রোগ্রামের ফলে একটি দেশের গুরুত্বপূর্ণ প্রতিষ্ঠানগুলোর সফটওয়্যার চলবে কি না, তা নির্ভর করবে একটি জবাবদিহিহীন বিদেশি কর্পোরেশনের মর্জির ওপর।
impact_gov_p2: >-
    [EFF-এর মতে ↗](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) অ্যাপ গেটকিপিং হলো "ইন্টারনেট সেন্সরশিপের একটি ক্রমবর্ধমান পথ।"

# Advanced flow
flow_heading: "গুগলের তথাকথিত 'এস্কেপ হ্যাচ' আসলে একটি ফাঁদ"
flow_intro: >-
    গুগল বলছে যে "পাওয়ার ইউজাররা" চাইলে এখনো আনভেরিফাইড অ্যাপ ["ইন্সটল করতে পারবে"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html)। কিন্তু কাজটা আসলে কতটা কঠিন, দেখুন:
flow_step1: "সিস্টেম সেটিংসের গভীরে গিয়ে ডেভেলপার অপশন খুঁজুন"
flow_step2: "ডেভেলপার মোড চালু করতে বিল্ড নাম্বারে **সাতবার** ট্যাপ করুন"
flow_step3: "ভয় দেখানো সব ওয়ার্নিং স্ক্রিন এড়িয়ে যান"
flow_step4: "আপনার পিন (PIN) দিন"
flow_step5: "ডিভাইস রিস্টার্ট দিন"
flow_step6: "**২৪ ঘণ্টা অপেক্ষা করুন**"
flow_step7: "আবার ফিরে এসে আরও ভয়ংকর সব স্ক্রিন বাতিল করুন"
flow_step8: >-
    "অস্থায়ীভাবে অনুমতি দিন" (৭ দিন) অথবা "স্থায়ীভাবে অনুমতি দিন" অপশনটি বেছে নিন"
flow_step9: >-
    "আপনি যে "ঝুঁকি" বুঝতে পারছেন তা আবারও নিশ্চিত করুন"
flow_summary: "নয়টি ধাপ। বাধ্যতামূলক ২৪ ঘণ্টার ওয়েটিং পিরিয়ড। *শুধুমাত্র আপনার নিজের ডিভাইসে সফটওয়্যার ইন্সটল করার জন্য।*"
flow_detail: >-
    আরও খারাপ বিষয় হলো: এই পুরো প্রক্রিয়াটি চলে **গুগল প্লে সার্ভিস (Google Play Services)**-এর মাধ্যমে, অ্যান্ড্রয়েড ওএস (Android OS)-এর মাধ্যমে নয়। গুগল যেকোনো সময় ওএস (OS) আপডেট ছাড়াই আপনার অনুমতি ছাড়াই এটি পরিবর্তন করতে বা বন্ধ করে দিতে পারে। আজ পর্যন্ত এটি কোনো বেটা বা প্রিভিউ ভার্সনেও আসেনি; এটি কেবল একটি ব্লগ পোস্ট এবং কিছু নকশা হিসেবে টিকে আছে।

# Precedent
precedent_heading: "এটি কেবল অ্যান্ড্রয়েডের বিষয় নয়"
precedent_pullquote: "গুগল যদি বিলিয়ন বিলিয়ন ডিভাইসকে এভাবে লকডাউন করে দিতে পারে যা আগে ওপেন হিসেবে বিক্রি হয়েছিল, তবে বিশ্বের প্রতিটি হার্ডওয়্যার নির্মাতা কোম্পানি সেদিকেই নজর দেবে।"
precedent_p1: >-
    এখানে যে মূলনীতিটি তৈরি হচ্ছে তা হলো: **ডিভাইস নির্মাতা কোম্পানি আপনার কেনা জিনিসের ওপর সিদ্ধান্ত নেবে যে আপনি কোন সফটওয়্যার চালাতে পারবেন।** সফটওয়্যারের ভাষায় একে বলা হয় "রাগ পুল" (Rug pull); কিন্তু আগে অন্তত আপনি বিকল্প সফটওয়্যার ইন্সটল করতে পারতেন। হার্ডওয়্যারের ক্ষেত্রে এটি আপনাকে ক্ষমতাহীন করে তুলবে এবং আপনাকে একজন জবাবদিহিহীন গেটকিপার ও দণ্ডিত একচেটিয়া ব্যবসায়ীর মর্জির ওপর ছেড়ে দেবে।
precedent_p2: >-
    অ্যান্ড্রয়েডের উন্মুক্ততা কেবল একটি ফিচার ছিল না; এটি ছিল সেই *প্রতিশ্রুতি* যা একে আইফোন থেকে আলাদা করেছিল। লাখ লাখ মানুষ ঠিক এই কারণেই অ্যান্ড্রয়েড বেছে নিয়েছিলেন। গুগল এখন একতরফাভাবে সেই প্রতিশ্রুতি কেড়ে নিচ্ছে, কারণ তারা মনে করছে বাজারে তাদের একচেটিয়া আধিপত্য আছে এবং কেউ তাদের আটকাতে পারবে না।
precedent_arstechnica: >-
    [Ars Technica-এর মতে ↗](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"গুগলের অ্যাপল হওয়ার আকাঙ্ক্ষা অ্যান্ড্রয়েডের উন্মুক্ত ঐতিহ্যকে ধ্বংস করার হুমকি দিচ্ছে।"*

# Objections
objections_heading: "কিন্তু দাঁড়ান, এটি কি..."
obj_security_q: >-
    "...নিরাপত্তার জন্য নয়?"
obj_security_a: >-
    নিরাপত্তার দোহাই আসলে একটি ধোঁকাবাজি। গুগল প্লে প্রোটেক্ট (Google Play Protect) অলরেডি ম্যালওয়্যার স্ক্যান করতে পারে, তার জন্য ডেভেলপার রেজিস্ট্রেশনের প্রয়োজন নেই। সরকারি আইডি নিলেই কোড নিরাপদ হয় না; বরং এতে *ডেভেলপারদের* নিয়ন্ত্রণ করা সহজ হয়। ম্যালওয়্যার নির্মাতারাও রেজিস্টার করতে পারে, কিন্তু ছোট ডেভেলপার বা ভিন্নমতাবলম্বীরা প্রায়ই তা পারে না। [EFF ↗](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) পরিষ্কারভাবে বলেছে: আইডেন্টিটি-ভিত্তিক গেটকিপিং হলো সেন্সরশিপের হাতিয়ার, নিরাপত্তার নয়।
obj_sideloading_q: >-
    "...অ্যাডভান্সড ফ্লো ব্যবহার করলে কি সাইডলোডিং করা যাবে না?"
obj_sideloading_a: >-
    নয়টি ধাপ, ২৪ ঘণ্টার অপেক্ষা, ডেভেলপার অপশনে লুকিয়ে রাখা এবং গুগলের ইচ্ছামতো বাতিলযোগ্য একটি সার্ভিস—একে সাইডলোডিং বলা যায় না। এটি একটি **প্রতিরোধমূলক ব্যবস্থা** যা তৈরি করা হয়েছে যাতে কেউ এই প্রক্রিয়া শেষ করতে না পারে। আর যেহেতু এটি প্লে সার্ভিসের মাধ্যমে চলে, গুগল যেকোনো সময় এটি আরও কঠিন বা বন্ধ করে দিতে পারে।
obj_hide_q: >-
    "...লুকানোর কিছু না থাকলে কি সমস্যা আছে?"
obj_hide_a: >-
    স্বৈরাচারী সরকারের অধীনে থাকা হুইসেলব্লোয়ার, সাংবাদিক এবং অ্যাক্টিভিস্টরাই হবেন এর প্রথম শিকার। এরপর ক্ষতিগ্রস্ত হবেন পারিবারিক সহিংসতার শিকার মানুষগুলো। এই সব গ্রুপের মানুষের গুগলের ডেটাবেজে নিজেদের আইনি পরিচয় না দিয়ে সফটওয়্যার ব্যবহার করার বৈধ কারণ আছে। বেনামে ওপেন-সোর্স অবদান রাখা গুগলের চেয়েও পুরনো একটি ঐতিহ্য। গুগলের এই নীতি অ্যান্ড্রয়েডে সেই ঐতিহ্যের ইতি টানবে।
obj_apple_q: >-
    "...অ্যাপল যা করে গুগলও কি তাই করছে না?"
obj_apple_a: >-
    অ্যাপল শুরু থেকেই একটি ক্লোজড সিস্টেম বা 'ওয়াল্ড গার্ডেন' ছিল। মানুষ অ্যান্ড্রয়েড বেছে নিয়েছিল *কারণ এটি আলাদা ছিল*। "অ্যাপলও এটা করে"—এই যুক্তি দিয়ে নিজেদের ভুল ঢাকতে চাওয়াটা একটা রেস টু দ্য বটম। তাছাড়া রেগুলেটরি চাপের কারণে (ইইউ-এর ডিজিটাল মার্কেটস অ্যাক্ট) এখন অ্যাপলও সিস্টেম ওপেন করতে বাধ্য হচ্ছে। অথচ গুগল ঠিক উল্টো পথে হাঁটছে।
obj_cost_q: >-
    "...মাত্র ২৫ ডলার আর কিছু কাগজপত্রই তো?"
obj_cost_a: >-
    হয়তো আপনার জন্য সহজ, যদি আপনি আমেরিকার ডেভেলপার হন যার ক্রেডিট কার্ড আর ড্রাইভিং লাইসেন্স আছে। কিন্তু সাব-সাহারান আফ্রিকার একজন ছাত্র, বা মিয়ানমারের একজন ভিন্নমতাবলম্বী, অথবা কমিউনিটি হেলথ অ্যাপ চালানো কোনো ভলান্টিয়ারের কথা ভাবুন। এর খরচ শুধু আর্থিক নয়: আপনি আপনার সরকারি আইডি এবং সাইনিং কী এমন একটি কোম্পানির হাতে তুলে দিচ্ছেন যারা [অহরহ ↗](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) সরকারের কথা শুনে অ্যাপ সরিয়ে ফেলে এবং ডেভেলপারদের তথ্য ফাঁস করে দেয়।

# Fight back
act_heading: "প্রতিরোধ গড়ে তুলুন"
act_everyone_heading: "সবার জন্য"
act_fdroid: >-
    আপনার প্রতিটি অ্যান্ড্রয়েড ডিভাইসে **[F-Droid ইন্সটল করুন ↗](https://f-droid.org)**। বিকল্প অ্যাপ স্টোরগুলো কেবল তখনই টিকে থাকবে যখন মানুষ সেগুলো ব্যবহার করবে।
act_regulators: >-
    **[আপনার রেগুলেটরদের সাথে যোগাযোগ করুন।](/cta/#consumers)** বিশ্বের সব দেশের রেগুলেটররাই টেক সেক্টরে একচেটিয়া আধিপত্য নিয়ে চিন্তিত এবং তারা সরাসরি ভুক্তভোগীদের কথা শুনতে চান।
act_share: >-
    **এই পেজটি শেয়ার করুন।** সব জায়গায় [keepandroidopen.org](https://keepandroidopen.org) লিংকটি ছড়িয়ে দিন।
act_astroturf: >-
    **ভুয়া প্রচারণার বিরুদ্ধে দাঁড়ান।** অনেকে গুগলের হয়ে সাফাই গাইতে পারে, তাদের বিভ্রান্তিকর যুক্তিতে কান দেবেন না।
act_petition: >-
    **[change.org পিটিশনে সই করুন ↗](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** এবং ১ লাখের বেশি মানুষের সাথে যোগ দিন যারা ইতোমধ্যে প্রতিবাদ জানিয়েছেন।
act_letter: >-
    **[আমাদের খোলা চিঠিটি পড়ুন এবং শেয়ার করুন](/open-letter)**
act_survey: >-
    গুগলের নিজস্ব [ডেভেলপার ভেরিফিকেশন সার্ভেতে ↗](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) **আপনার মতামত জানান** <small>(যদিও জানি না এতে কতটা কাজ হবে)</small>।
act_dev_heading: "ডেভেলপারদের জন্য"
act_dev_intro: >-
    **রেজিস্ট্রেশন করবেন না।** অ্যান্ড্রয়েড ডেভেলপার কনসোলে সাইন-আপ করে গুগলের এই অন্যায় শর্তাবলীতে রাজি হবেন না। আপনার পরিচয় ভেরিফাই করবেন না। *তাদের এই খেলায় পা দেবেন না।*
act_dev_resist: "গুগলের পরিকল্পনা কেবল তখনই সফল হবে যদি ডেভেলপাররা তা মেনে নেয়। তাই মানবেন না।"
act_dev_talk: "অন্যান্য ডেভেলপার ও সংস্থাগুলোকে সাইন-আপ না করতে উদ্বুদ্ধ করুন।"
act_dev_warn: >-
    ব্যবহারকারীদের সতর্ক করতে আপনার অ্যাপে [FreeDroidWarn লাইব্রেরি ↗](https://github.com/woheller69/FreeDroidWarn) যুক্ত করুন।
act_dev_banner: >-
    আপনার কি ওয়েবসাইট আছে? [আমাদের কাউন্টডাউন ব্যানারটি যুক্ত করুন।](/banner)
act_google_heading: "গুগল কর্মীদের জন্য"
act_google_text: >-
    আপনি যদি এই প্রোগ্রামের কারিগরি বাস্তবায়ন বা অভ্যন্তরীণ উদ্দেশ্য সম্পর্কে কিছু জানেন, তবে একটি *অফিসিয়াল নয় এমন* কম্পিউটার এবং *নন-জিমেইল* অ্যাকাউন্ট থেকে [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org)-এ যোগাযোগ করুন। আপনার গোপনীয়তা রক্ষা করা হবে।

